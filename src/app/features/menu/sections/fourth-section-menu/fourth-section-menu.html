<section id="menu-bebidas" class="max-w-[90rem] mx-auto px-4 py-16">
  <!-- Section Title with Decorative Scroll -->
  <div class="mb-12 flex flex-col items-center gap-4">
    <h2 class="text-center text-[#6d3b47] text-4xl md:text-6xl font-serif">
      Bebidas
    </h2>
    <div class="relative w-48 h-8 flex justify-center items-center">
      <svg viewBox="0 0 200 40" class="w-full h-full" fill="none" preserveAspectRatio="xMidYMid meet">
        <path d="M20 20C40 20 45 10 55 10C65 10 70 20 70 20C70 20 65 30 55 30C45 30 40 20 20 20Z" stroke="#6d3b47" stroke-width="2" />
        <path d="M180 20C160 20 155 10 145 10C135 10 130 20 130 20C130 20 135 30 145 30C155 30 160 20 180 20Z" stroke="#6d3b47" stroke-width="2" />
        <path d="M80 20H120" stroke="#6d3b47" stroke-width="2" stroke-linecap="round" />
        <circle cx="100" cy="15" r="3" fill="#6d3b47" />
        <circle cx="92" cy="20" r="2" fill="#6d3b47" />
        <circle cx="108" cy="20" r="2" fill="#6d3b47" />
      </svg>
    </div>
  </div>

  <!-- Responsive Product Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
    @for (item of visibleBebidas(); track item.id) {
      @let quantity = itemQuantities().get(item.id) ?? 0;
      <article class="menu-list-card group flex flex-col bg-white rounded-3xl overflow-hidden shadow-lg transition-all duration-500 border border-[#f0e6dc]">
        <!-- Product Image -->
        <div class="relative h-64 overflow-hidden bg-[#f9f3ee]">
          <img 
            [src]="item.image" 
            [alt]="item.name"
            loading="lazy"
            decoding="async"
            width="480"
            height="320"
            class="menu-list-card-image w-full h-full object-cover transition-transform duration-700"
          >
          <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm px-4 py-1.5 rounded-full shadow-md">
            <span class="text-[#6d3b47] font-bold">$ {{ item.price | number:'1.2-2' }}</span>
          </div>
        </div>

        <!-- Product Content -->
        <div class="p-6 flex flex-col flex-1 gap-3">
          <h3 class="menu-list-card-title text-xl font-bold text-[#6d3b47] transition-colors">
            {{ item.name }}
          </h3>
          <p class="text-sm text-gray-600 line-clamp-2 leading-relaxed">
            {{ item.description }}
          </p>
          
          <!-- Add to Cart Button -->
          <button 
            type="button"
            (click)="incrementQuantity(item)"
            class="menu-list-action group mt-auto flex w-full items-center justify-between overflow-hidden rounded-2xl bg-[#6d3b47] p-1 text-sm font-medium text-white transition-all duration-300 shadow-md"
          >
            <!-- Menos (o placeholder para centrado) -->
            <div class="flex h-10 w-10 items-center justify-center">
              <span 
                *ngIf="quantity > 0"
                (click)="decrementQuantity(item); $event.stopPropagation()"
                class="menu-list-action-minus flex h-full w-full items-center justify-center rounded-xl bg-white/10 transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4" />
                </svg>
              </span>
            </div>

            <!-- Texto Centro -->
            <span class="flex-1 text-center py-2 text-[0.95rem] font-semibold">
              Agregar 
              <span *ngIf="quantity > 0" class="ml-1 font-bold">
                {{ quantity }}
              </span>
            </span>

            <!-- Más -->
            <div class="flex h-10 w-10 items-center justify-center">
              <span 
                class="menu-list-action-plus flex h-full w-full items-center justify-center rounded-xl bg-white/10 transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
              </span>
            </div>
          </button>

        </div>
      </article>
    }
  </div>

  <!-- "Ver más" Button -->
  @if (hasMore()) {
    <div class="mt-16 flex justify-center">
      <button 
        (click)="showMore()"
        class="menu-list-more-button group relative px-10 py-4 bg-transparent border-2 border-[#6d3b47] text-[#6d3b47] rounded-full font-bold overflow-hidden transition-all duration-500"
      >
        <span class="relative z-10">Ver más bebidas</span>
        <div class="menu-list-more-fill absolute inset-0 bg-[#6d3b47] translate-y-full transition-transform duration-500 ease-out"></div>
      </button>
    </div>
  }
</section>
