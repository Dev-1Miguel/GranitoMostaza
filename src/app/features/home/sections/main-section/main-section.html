<section
  id="home"
  class="main-section"
  (mousemove)="onPointerMove($event)"
  (mouseleave)="resetPointer()"
>
  <div class="main-section__overlay"></div>

  <div class="main-section__pattern" aria-hidden="true">
    <div
      *ngFor="let item of decorativeItems; trackBy: trackById"
      class="main-section__shape"
      [ngStyle]="getItemStyle(item)"
    >
      <div
        class="main-section__shape-inner"
        [class]="item.floatClass"
        [style.transform]="'rotate(' + item.rotate + 'deg)'"
      >
        <ng-container [ngSwitch]="item.type">
          <!-- CUPCAKE -->
          <svg *ngSwitchCase="'cupcake'" viewBox="0 0 120 120" class="shape-svg">
            <path d="M32 55c0-14 10-24 28-24s28 10 28 24c0 7-3 12-6 16H38c-3-4-6-9-6-16Z" />
            <path d="M42 71h36l-5 30H47l-5-30Z" />
            <path d="M43 81c6 4 11 4 17 0c6 4 11 4 17 0" />
            <path d="M47 43c1-8 6-13 13-13c8 0 13 5 13 13" />
          </svg>

          <!-- LOLLIPOP -->
          <svg *ngSwitchCase="'lollipop'" viewBox="0 0 120 120" class="shape-svg">
            <circle cx="58" cy="40" r="22" />
            <path d="M58 62v38" />
            <path d="M48 30c6-6 18-6 24 0c6 6 6 18 0 24c-6 6-18 6-24 0c-6-6-6-18 0-24Z" />
            <path d="M48 40c4-4 12-4 16 0c4 4 4 12 0 16" />
          </svg>

          <!-- CANDY -->
          <svg *ngSwitchCase="'candy'" viewBox="0 0 120 120" class="shape-svg">
            <path d="M36 60l-14-10v20l14-10Z" />
            <path d="M84 60l14-10v20L84 60Z" />
            <rect x="34" y="42" width="52" height="36" rx="18" ry="18" />
            <path d="M42 50c10 6 26 6 36 0" />
            <path d="M42 70c10-6 26-6 36 0" />
          </svg>

          <!-- CAKE -->
          <svg *ngSwitchCase="'cake'" viewBox="0 0 120 120" class="shape-svg">
            <ellipse cx="60" cy="102" rx="32" ry="8" />
            <path d="M38 92V62h44v30" />
            <path d="M44 62V42h32v20" />
            <path d="M52 42V28h16v14" />
            <path d="M38 72c7 5 14 5 22 0c7 5 14 5 22 0" />
            <path d="M44 52c5 4 10 4 16 0c5 4 10 4 16 0" />
          </svg>

          <!-- DONUT -->
          <svg *ngSwitchCase="'donut'" viewBox="0 0 120 120" class="shape-svg">
            <path d="M30 64c0-20 14-34 30-34s30 14 30 34c0 16-12 28-30 28S30 80 30 64Z" />
            <circle cx="60" cy="64" r="10" />
            <path d="M34 56c7-5 14-7 26-7c16 0 25 5 29 9" />
            <path d="M42 44l2 4M52 40l2 4M68 39l1 4M78 45l2 4M86 56l2 3" />
          </svg>

          <!-- ROLL -->
          <svg *ngSwitchCase="'roll'" viewBox="0 0 120 120" class="shape-svg">
            <path d="M28 76c0-18 14-32 32-32h18c8 0 14 6 14 14v4c0 16-14 30-30 30H42c-8 0-14-6-14-16Z" />
            <path d="M58 44c12 6 22 18 22 30" />
            <path d="M50 58c6-6 16-6 22 0c6 6 6 16 0 22c-6 6-16 6-22 0c-6-6-6-16 0-22Z" />
          </svg>
        </ng-container>
      </div>
    </div>
  </div>

  <div class="main-section__content">
    <p class="main-section__eyebrow">Bienvenido</p>

    <h1 class="main-section__title">
      Granito de<br />
      Mostaza
    </h1>

    <p class="main-section__text">
      Una cafetería donde cada detalle está pensado para convertir postres,
      desayunos y bebidas en una experiencia cálida, delicada y memorable.
    </p>

    <div class="main-section__actions" appFadeIn [appFadeInDelay]="200">
      <a href="#destacados" class="main-section__btn">
        Ver destacados
      </a>
    </div>
  </div>
</section>
