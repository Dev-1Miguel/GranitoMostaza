<section class="relative z-[1] bg-transparent px-6 py-20 md:px-10 lg:px-16">
  <div class="mx-auto max-w-7xl">
    <div class="mb-12 text-center">
      <h2 class="mt-4 text-3xl font-semibold text-[#6d3b47] md:text-4xl">
        Nuestros destacados
      </h2>

      <p class="mx-auto mt-4 max-w-2xl text-[15px] leading-7 text-[#625b57]">
        Una selección pensada para conservar la línea elegante, cálida y limpia
        de la cafetería.
      </p>
    </div>

    <app-menu-category
      class="mb-14 block"
      title="Postres"
      [items]="postres"
      (itemAdded)="addToCart($event)"
    ></app-menu-category>

    <app-menu-category
      class="block"
      title="Desayunos"
      [items]="desayunos"
      (itemAdded)="addToCart($event)"
    ></app-menu-category>
  </div>
</section>
