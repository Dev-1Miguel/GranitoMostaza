<section class="bg-[#f8f1e7] px-6 py-20 md:px-10 lg:px-16">
  <div class="mx-auto max-w-7xl">
    <div class="mb-12 text-center">
      <h2 class="mt-4 text-3xl font-semibold text-[#6d3b47] md:text-4xl">
        Nuestros destacados
      </h2>

      <p class="mx-auto mt-4 max-w-2xl text-[15px] leading-7 text-[#625b57]">
        Una selección pensada para conservar la línea elegante, cálida y limpia
        de la cafetería.
      </p>
    </div>

    <!-- POSTRES -->
    <div class="mb-14">
      <div class="rounded-[24px] border border-[#dccabd] bg-white px-6 py-4 shadow-sm">
        <h3 class="text-center text-2xl font-semibold text-[#6d3b47] md:text-[1.9rem]">
          Postres
        </h3>
      </div>

      <div class="relative mt-6">
        <button
          type="button"
          (click)="scroll(postresTrack, 'left')"
          class="absolute left-2 top-1/2 z-10 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-[#d8c1af] bg-white text-xl text-[#6d3b47] shadow-md transition hover:bg-[#f7efe6] md:hidden"
          aria-label="Desplazar postres a la izquierda"
        >
          ‹
        </button>

        <div
          #postresTrack
          class="flex items-stretch gap-6 overflow-x-auto overflow-y-visible scroll-smooth snap-x snap-mandatory pb-6 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden"
        >
          <article
            *ngFor="let item of postres; trackBy: trackById"
            class="flex min-w-[280px] max-w-[280px] shrink-0 snap-start flex-col rounded-[28px] border border-[#e9ddd0] bg-white shadow-md sm:min-w-[300px] sm:max-w-[300px]"
          >
            <div class="h-52 w-full overflow-hidden rounded-t-[28px] bg-[#f8f1e7]">
              <img
                [src]="item.image"
                [alt]="item.name"
                class="h-full w-full object-cover transition-transform duration-500 hover:scale-105"
              />
            </div>

            <div class="flex flex-1 flex-col p-5">
              <div class="flex items-start justify-between gap-3">
                <h4 class="text-[1.05rem] font-semibold leading-snug text-[#6d3b47]">
                  {{ item.name }}
                </h4>

                <span
                  class="whitespace-nowrap rounded-full bg-[#f4e6d8] px-3 py-1 text-sm font-semibold text-[#6d3b47]"
                >
                  {{ item.price }}
                </span>
              </div>

              <p class="mt-3 text-sm leading-6 text-[#5f5a56]">
                {{ item.description }}
              </p>

              <button
                type="button"
                (click)="addToCart(item)"
                class="mt-auto w-full rounded-full bg-[#6d3b47] px-4 py-3 text-sm font-medium text-white transition duration-300 hover:bg-[#5a2f3a]"
              >
                Agregar al carrito
              </button>
            </div>
          </article>
        </div>

        <button
          type="button"
          (click)="scroll(postresTrack, 'right')"
          class="absolute right-2 top-1/2 z-10 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-[#d8c1af] bg-white text-xl text-[#6d3b47] shadow-md transition hover:bg-[#f7efe6] md:hidden"
          aria-label="Desplazar postres a la derecha"
        >
          ›
        </button>
      </div>
    </div>

    <!-- DESAYUNOS -->
    <div>
      <div class="rounded-[24px] border border-[#dccabd] bg-white px-6 py-4 shadow-sm">
        <h3 class="text-center text-2xl font-semibold text-[#6d3b47] md:text-[1.9rem]">
          Desayunos
        </h3>
      </div>

      <div class="relative mt-6">
        <button
          type="button"
          (click)="scroll(desayunosTrack, 'left')"
          class="absolute left-2 top-1/2 z-10 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-[#d8c1af] bg-white text-xl text-[#6d3b47] shadow-md transition hover:bg-[#f7efe6] md:hidden"
          aria-label="Desplazar desayunos a la izquierda"
        >
          ‹
        </button>

        <div
          #desayunosTrack
          class="flex items-stretch gap-6 overflow-x-auto overflow-y-visible scroll-smooth snap-x snap-mandatory pb-6 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden"
        >
          <article
            *ngFor="let item of desayunos; trackBy: trackById"
            class="flex min-w-[280px] max-w-[280px] shrink-0 snap-start flex-col rounded-[28px] border border-[#e9ddd0] bg-white shadow-md sm:min-w-[300px] sm:max-w-[300px]"
          >
            <div class="h-52 w-full overflow-hidden rounded-t-[28px] bg-[#f8f1e7]">
              <img
                [src]="item.image"
                [alt]="item.name"
                class="h-full w-full object-cover transition-transform duration-500 hover:scale-105"
              />
            </div>

            <div class="flex flex-1 flex-col p-5">
              <div class="flex items-start justify-between gap-3">
                <h4 class="text-[1.05rem] font-semibold leading-snug text-[#6d3b47]">
                  {{ item.name }}
                </h4>

                <span
                  class="whitespace-nowrap rounded-full bg-[#f4e6d8] px-3 py-1 text-sm font-semibold text-[#6d3b47]"
                >
                  {{ item.price }}
                </span>
              </div>

              <p class="mt-3 text-sm leading-6 text-[#5f5a56]">
                {{ item.description }}
              </p>

              <button
                type="button"
                (click)="addToCart(item)"
                class="mt-auto w-full rounded-full bg-[#6d3b47] px-4 py-3 text-sm font-medium text-white transition duration-300 hover:bg-[#5a2f3a]"
              >
                Agregar al carrito
              </button>
            </div>
          </article>
        </div>

        <button
          type="button"
          (click)="scroll(desayunosTrack, 'right')"
          class="absolute right-2 top-1/2 z-10 flex h-9 w-9 -translate-y-1/2 items-center justify-center rounded-full border border-[#d8c1af] bg-white text-xl text-[#6d3b47] shadow-md transition hover:bg-[#f7efe6] md:hidden"
          aria-label="Desplazar desayunos a la derecha"
        >
          ›
        </button>
      </div>
    </div>
  </div>
</section>
