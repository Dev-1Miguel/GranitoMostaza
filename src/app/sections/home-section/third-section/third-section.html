<section class="relative z-[1] bg-transparent px-2 pt-8 pb-16 md:px-3 lg:px-4">
  <div class="mx-auto max-w-[1570px]">
    <div class="mb-12 text-center">
      <h2 class="text-4xl font-bold text-[#6d3b47] md:text-5xl lg:text-6xl">
        Nuestros destacados
      </h2>

      <p class="mx-auto mt-4 max-w-2xl text-base leading-7 text-[#625b57] md:text-lg">
        Una selección pensada para conservar la línea elegante, cálida y limpia
        de la cafetería.
      </p>
    </div>

    <app-menu-category
      class="mb-14 block"
      title="Postres"
      [items]="postres"
      (itemAdded)="addToCart($event)"
    ></app-menu-category>

    <app-menu-category
      class="block"
      title="Desayunos"
      [items]="desayunos"
      (itemAdded)="addToCart($event)"
    ></app-menu-category>
  </div>
</section>
