<div class="m-0 h-screen w-full overflow-hidden bg-[#F5EEDC] flex items-center justify-center p-4">
  <div class="w-full max-w-5xl rounded-[32px] bg-[#C48B8B]/20 p-3 shadow-sm flex max-h-full">
    <div class="flex-1 grid grid-cols-1 gap-6 rounded-[24px] bg-white p-4 lg:grid-cols-[1fr_1fr] lg:p-6 max-h-full overflow-y-auto custom-scrollbar">
      <!-- Left visual -->
      <div class="hidden lg:block relative w-full h-full min-h-[400px]">
        <div class="absolute inset-0 rounded-[20px] overflow-hidden bg-[#d9d3cc]">
          <img src="assets/images/ads/Ingreso.jpg" alt="Plant" class="w-full h-full object-cover">
        </div>
      </div>

      <!-- Right panel -->
      <div class="flex items-center justify-center py-4">
        <div class="w-full max-w-[420px]">
          <div class="mb-6 text-center">
            <h1 class="text-[32px] md:text-[36px] font-semibold leading-tight tracking-[-0.03em] text-[#8B2323]">
              Inicia sesión
            </h1>
            <p class="mt-2 text-[14px] text-[#9b9b9b]">
              ¡Bienvenido de nuevo! Ingresa tus datos para acceder a tu cuenta
            </p>
          </div>

          <form class="space-y-4">
            <div>
              <label for="email" class="mb-1 block text-[14px] font-medium text-[#7b7b7b]">Correo electrónico</label>
              <input
                id="email"
                type="email"
                placeholder="Ingresa tu correo"
                class="h-12 w-full rounded-full border border-[#e6e6e6] bg-white px-4 text-[14px] outline-none transition focus:border-[#8B2323] focus:ring-2 focus:ring-[#8B2323]/15"
              />
            </div>

            <div>
              <label for="password" class="mb-1 block text-[14px] font-medium text-[#7b7b7b]">Contraseña</label>
              <input
                id="password"
                type="password"
                placeholder="Ingresa tu contraseña"
                class="h-12 w-full rounded-full border border-[#e6e6e6] bg-white px-4 text-[14px] outline-none transition focus:border-[#8B2323] focus:ring-2 focus:ring-[#8B2323]/15"
              />
            </div>

            <div class="flex items-center justify-between gap-4 pt-1 text-[13px]">
              <label class="flex items-center gap-2 text-[#8a8a8a]">
                <input
                  type="checkbox"
                  class="h-4 w-4 rounded border-[#cfcfcf] text-[#8B2323] focus:ring-[#8B2323]"
                />
                <span>Recordar sesión</span>
              </label>

              <a href="#" class="font-medium text-[#8B2323] hover:underline">¿Olvidaste tu contraseña?</a>
            </div>

            <button
              type="submit"
              class="mt-2 h-12 w-full rounded-full bg-[#8B2323] text-[16px] font-semibold text-white transition hover:bg-[#6D1B1B]"
            >
              Iniciar sesión
            </button>
          </form>

          <div class="my-6 flex items-center gap-4">
            <div class="h-px flex-1 bg-[#e9e9e9]"></div>
            <span class="text-[13px] text-[#9b9b9b]">O continúa con</span>
            <div class="h-px flex-1 bg-[#e9e9e9]"></div>
          </div>

          <div class="space-y-3">
            <button
              type="button"
              class="flex h-12 w-full items-center justify-center gap-3 rounded-full bg-[#f3f3f5] text-[16px] font-medium text-[#181818] transition hover:bg-[#ebebef]"
            >
              <span class="text-[20px] leading-none"></span>
              <span>Continuar con Apple</span>
            </button>

            <button
              type="button"
              class="flex h-12 w-full items-center justify-center gap-3 rounded-full bg-[#f3f3f5] text-[16px] font-medium text-[#181818] transition hover:bg-[#ebebef]"
            >
              <svg viewBox="0 0 48 48" class="h-4 w-4">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.2c-2.1 1.6-4.7 2.5-7.3 2.5-5.3 0-9.7-3.3-11.4-8l-6.5 5C9.4 39.6 16.1 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3-3.2 5.4-6 7l6.2 5.2C39.1 37 44 31.1 44 24c0-1.3-.1-2.4-.4-3.5z"/>
              </svg>
              <span>Continuar con Google</span>
            </button>
          </div>

          <p class="mt-6 text-center text-[14px] text-[#8d8d8d]">
            ¿No tienes cuenta?
            <a href="#" class="font-medium text-[#8B2323] hover:underline">Regístrate</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
