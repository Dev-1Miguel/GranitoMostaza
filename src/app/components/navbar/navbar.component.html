<header class="absolute top-0 left-0 z-50 w-full">
  <nav
    class="mx-auto grid max-w-7xl grid-cols-[1fr_auto_1fr] items-center px-6 py-5 text-white"
  >
    <!-- Logo -->
    <a
      href="#"
      class="justify-self-start text-2xl font-extrabold tracking-[0.2em] uppercase"
    >
      CREATIVO
    </a>

    <!-- Menú centrado -->
    <ul class="hidden md:flex justify-self-center items-center gap-8 text-sm font-semibold uppercase tracking-wide">
      <li><a href="#home" class="transition hover:text-cyan-300">Home</a></li>
      <li><a href="#about" class="transition hover:text-cyan-300">About</a></li>
      <li><a href="#portfolio" class="transition hover:text-cyan-300">Portfolio</a></li>
      <li><a href="#services" class="transition hover:text-cyan-300">Services</a></li>
      <li><a href="#contact" class="transition hover:text-cyan-300">Contact</a></li>
    </ul>

    <!-- Derecha -->
    <div class="justify-self-end flex items-center gap-3">
      <button
        type="button"
        class="hidden rounded-md border border-white/30 bg-white/10 px-4 py-2 text-sm font-semibold uppercase tracking-wide backdrop-blur-sm transition hover:bg-white/20 md:inline-flex"
      >
        Carrito
      </button>

      <!-- Botón móvil -->
      <button
        type="button"
        class="inline-flex items-center justify-center rounded-md border border-white/30 bg-white/10 p-2 backdrop-blur-sm transition hover:bg-white/20 md:hidden"
        aria-label="Abrir menú"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
    </div>
  </nav>
</header>
